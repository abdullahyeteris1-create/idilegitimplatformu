<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Kare Görme Çalışması</title>
  <desc id="desc">Merkez odak noktası ve çevresinde işaretlenmiş iki harf bulunan kare alan</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#fee2e2"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <rect width="34" height="34" fill="#ffffff"/>
      <path d="M34 0H0V34" fill="none" stroke="#e2e8f0" stroke-width="2"/>
    </pattern>
  </defs>
  <rect width="640" height="360" rx="36" fill="url(#background)"/>
  <rect x="165" y="38" width="310" height="284" rx="22" fill="url(#grid)" stroke="#cbd5e1" stroke-width="4"/>
  <circle cx="320" cy="180" r="11" fill="#dc2626" stroke="#ffffff" stroke-width="4"/>
  <rect x="205" y="82" width="34" height="34" rx="8" fill="#fef3c7" stroke="#dc2626" stroke-width="4"/>
  <rect x="401" y="244" width="34" height="34" rx="8" fill="#fef3c7" stroke="#dc2626" stroke-width="4"/>
  <text x="222" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#991b1b">K</text>
  <text x="418" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#991b1b">K</text>
</svg>
