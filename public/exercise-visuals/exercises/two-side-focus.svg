<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="Çift Taraflı Odak">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf2f8"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-opacity=".18"/>
    </filter>
    <style>
      .float { animation: float 3.2s ease-in-out infinite; transform-origin: center; }
      .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
      .blink { animation: blink 1.4s ease-in-out infinite; }
      .dash { stroke-dasharray: 10 10; animation: dash 5s linear infinite; }
      .swing { animation: swing 3s ease-in-out infinite; transform-origin: center; }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
      @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.08); opacity: .78; } }
      @keyframes blink { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
      @keyframes dash { to { stroke-dashoffset: -120; } }
      @keyframes swing { 0%,100% { transform: rotate(-4deg); } 50% { transform: rotate(4deg); } }
    </style>
  </defs>
  <rect width="320" height="220" rx="32" fill="url(#bg)"/>
  <circle cx="270" cy="40" r="36" fill="#fff" opacity=".18"/>
  <circle cx="52" cy="184" r="44" fill="#fff" opacity=".12"/>
  
  <g filter="url(#shadow)">
    <circle class="float" cx="98" cy="110" r="42" fill="#ec4899"/>
    <circle class="float" cx="222" cy="110" r="42" fill="#be185d"/>
    <path d="M128 110h64" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
    <path d="M178 94l18 16-18 16" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

</svg>